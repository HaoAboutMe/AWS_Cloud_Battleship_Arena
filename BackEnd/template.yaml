  BackendCloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${AWS::StackName}-backend"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Key Lambda errors",
                "region": "${AWS::Region}",
                "stat": "Sum",
                "period": 300,
                "metrics": [
                  [ "AWS/Lambda", "Errors", "FunctionName", "${CreateRoomFunction}" ],
                  [ ".", ".", ".", "${JoinRoomFunction}" ],
                  [ ".", ".", ".", "${MatchmakeRoomFunction}" ],
                  [ ".", ".", ".", "${WebSocketMessageFunction}" ],
                  [ ".", ".", ".", "${GetUserFunction}" ],
                  [ ".", ".", ".", "${GetLeaderboardFunction}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Key Lambda duration p95",
                "region": "${AWS::Region}",
                "stat": "p95",
                "period": 300,
                "metrics": [
                  [ "AWS/Lambda", "Duration", "FunctionName", "${CreateRoomFunction}" ],
                  [ ".", ".", ".", "${JoinRoomFunction}" ],
                  [ ".", ".", ".", "${MatchmakeRoomFunction}" ],
                  [ ".", ".", ".", "${WebSocketMessageFunction}" ],
                  [ ".", ".", ".", "${GetUserFunction}" ],
                  [ ".", ".", ".", "${GetLeaderboardFunction}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "DynamoDB throttles",
                "region": "${AWS::Region}",
                "stat": "Sum",
                "period": 300,
                "metrics": [
                  [ "AWS/DynamoDB", "ReadThrottleEvents", "TableName", "${RoomsTable}" ],
                  [ ".", "WriteThrottleEvents", ".", "${RoomsTable}" ],
                  [ ".", "ReadThrottleEvents", ".", "${ConnectionsTable}" ],
                  [ ".", "WriteThrottleEvents", ".", "${ConnectionsTable}" ],
                  [ ".", "ReadThrottleEvents", ".", "${UserTable}" ],
                  [ ".", "WriteThrottleEvents", ".", "${UserTable}" ],
                  [ ".", "ReadThrottleEvents", ".", "${MatchHistoryTable}" ],
                  [ ".", "WriteThrottleEvents", ".", "${MatchHistoryTable}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "API Gateway activity",
                "region": "${AWS::Region}",
                "stat": "Sum",
                "period": 300,
                "metrics": [
                  [ "AWS/ApiGateway", "Count", "ApiId", "${BattleshipHttpApi}" ],
                  [ ".", "4xx", ".", "${BattleshipHttpApi}" ],
                  [ ".", "5xx", ".", "${BattleshipHttpApi}" ],
                  [ ".", "ConnectCount", "ApiId", "${BattleshipWebSocketApi}", "Stage", "prod" ],
                  [ ".", "MessageCount", ".", "${BattleshipWebSocketApi}", ".", "prod" ],
                  [ ".", "ClientError", ".", "${BattleshipWebSocketApi}", ".", "prod" ],
                  [ ".", "ServerError", ".", "${BattleshipWebSocketApi}", ".", "prod" ]
                ]
              }
            }
          ]
        }

Outputs:
  HttpApiUrl:
    Description: HTTP API base URL.
    Value: !Sub "https://${BattleshipHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  WebSocketUrl:
    Description: WebSocket API URL.
    Value: !Sub "wss://${BattleshipWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  RoomsTableName:
    Description: DynamoDB rooms table name.
    Value: !Ref RoomsTable
  ChatMessagesTableName:
    Description: DynamoDB room chat messages table name.
    Value: !Ref ChatMessagesTable
  BackendCloudWatchDashboardName:
    Description: CloudWatch dashboard name for backend metrics.
    Value: !Sub "${AWS::StackName}-backend"
  BackendMonitoringAlarmTopicArn:
    Condition: HasMonitoringAlarmEmail
    Description: SNS topic ARN used for backend CloudWatch alarm notifications.
    Value: !Ref MonitoringAlarmTopic
