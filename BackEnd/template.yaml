AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Cloud Battleship Arena serverless backend.

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - x86_64
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        ROOMS_TABLE: !Ref RoomsTable
        CONNECTIONS_TABLE: !Ref ConnectionsTable
        CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
        CORS_ORIGIN: !Ref CorsOrigin

Parameters:
  CorsOrigin:
    Type: String
    Default: "http://localhost:5173"
    Description: Frontend origin allowed to call the HTTP API.
  LocalCorsOrigin:
    Type: String
    Default: "http://localhost:5173"
    Description: Local frontend origin allowed during development.
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID
  CognitoUserPoolClientId:
    Type: String
    Description: Cognito User Pool Client ID

Resources:
  RoomsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Rooms
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: roomCode
          AttributeType: S
      KeySchema:
        - AttributeName: roomCode
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Connections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: roomCode
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: byRoomCode
          KeySchema:
            - AttributeName: roomCode
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ChatMessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ChatMessages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: roomCode
          AttributeType: S
        - AttributeName: messageKey
          AttributeType: S
      KeySchema:
        - AttributeName: roomCode
          KeyType: HASH
        - AttributeName: messageKey
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  BattleshipHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsOrigin
          - !Ref LocalCorsOrigin
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - content-type
          - authorization
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              Audience:
                - !Ref CognitoUserPoolClientId
              Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}"

  BattleshipWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: CloudBattleshipWebSocket
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  CreateRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: CreateRoom
      CodeUri: .
      Handler: src/handlers/createRoom.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RoomsTable
      Events:
        CreateRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /rooms
            Method: POST

  JoinRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: JoinRoom
      CodeUri: .
      Handler: src/handlers/joinRoom.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RoomsTable
      Events:
        JoinRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /rooms/{roomCode}/join
            Method: POST

  MatchmakeRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: MatchmakeRoom
      CodeUri: .
      Handler: src/handlers/matchmakeRoom.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RoomsTable
      Events:
        MatchmakeRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /matchmaking
            Method: POST

  GetRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetRoom
      CodeUri: .
      Handler: src/handlers/getRoom.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RoomsTable
      Events:
        GetRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /rooms/{roomCode}
            Method: GET

  ReadyRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ReadyRoom
      CodeUri: .
      Handler: src/handlers/readyRoom.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RoomsTable
      Events:
        ReadyRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /rooms/{roomCode}/ready
            Method: POST

  LobbyReadyRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: LobbyReadyRoom
      CodeUri: .
      Handler: src/handlers/lobbyReadyRoom.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RoomsTable
      Events:
        LobbyReadyRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /rooms/{roomCode}/lobby-ready
            Method: POST

  RematchRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: RematchRoom
      CodeUri: .
      Handler: src/handlers/rematchRoom.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RoomsTable
      Events:
        RematchRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /rooms/{roomCode}/rematch
            Method: POST

  LeaveRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: LeaveRoom
      CodeUri: .
      Handler: src/handlers/leaveRoom.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RoomsTable
      Events:
        LeaveRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /rooms/{roomCode}/leave
            Method: POST

  WebSocketConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: WebSocketConnect
      CodeUri: .
      Handler: src/handlers/wsConnect.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  WebSocketDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: WebSocketDisconnect
      CodeUri: .
      Handler: src/handlers/wsDisconnect.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  WebSocketMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: WebSocketMessage
      CodeUri: .
      Handler: src/handlers/wsMessage.handler
      Environment:
        Variables:
          ROOMS_TABLE: !Ref RoomsTable
          CONNECTIONS_TABLE: !Ref ConnectionsTable
          CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
          CORS_ORIGIN: !Ref CorsOrigin
          MATCH_HISTORY_TABLE: !Ref MatchHistoryTable
          AVATAR_BUCKET_NAME: !Ref AvatarBucket
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RoomsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatMessagesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserTable
        - DynamoDBReadPolicy:
            TableName: !Ref EmailIndexTable
        - Statement:
            Effect: Allow
            Action:
              - execute-api:ManageConnections
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${BattleshipWebSocketApi}/*"

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref BattleshipWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
        - FunctionArn: !GetAtt WebSocketConnectFunction.Arn

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref BattleshipWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
        - FunctionArn: !GetAtt WebSocketDisconnectFunction.Arn

  MessageIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref BattleshipWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FunctionArn}/invocations
        - FunctionArn: !GetAtt WebSocketMessageFunction.Arn

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref BattleshipWebSocketApi
      RouteKey: $connect
      Target: !Sub integrations/${ConnectIntegration}

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref BattleshipWebSocketApi
      RouteKey: $disconnect
      Target: !Sub integrations/${DisconnectIntegration}

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref BattleshipWebSocketApi
      RouteKey: $default
      Target: !Sub integrations/${MessageIntegration}

  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - ConnectRoute
      - DisconnectRoute
      - DefaultRoute
    Properties:
      ApiId: !Ref BattleshipWebSocketApi

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref BattleshipWebSocketApi
      DeploymentId: !Ref WebSocketDeployment
      StageName: prod
      AutoDeploy: true

  ConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketConnectFunction
      Principal: apigateway.amazonaws.com

  DisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketDisconnectFunction
      Principal: apigateway.amazonaws.com

  MessagePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketMessageFunction
      Principal: apigateway.amazonaws.com

  UserTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: User
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: username
          AttributeType: S
        - AttributeName: rank
          AttributeType: S
        - AttributeName: rankPoints
          AttributeType: N
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UsernameIndex
          KeySchema:
            - AttributeName: username
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: RankLeaderboardIndex
          KeySchema:
            - AttributeName: rank
              KeyType: HASH
            - AttributeName: rankPoints
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  EmailIndexTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: EmailIndex
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  MatchHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MatchHistoryV2
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: endedAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: endedAt
          KeyType: RANGE

  AvatarBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
              - GET
              - POST
              - HEAD
            AllowedOrigins:
              - !Ref CorsOrigin
              - !Ref LocalCorsOrigin
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AvatarBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AvatarBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadAvatars
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${AvatarBucket}/*"
            Condition:
              StringLike:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/*"

  # ==========================================
  # LAMBDA FUNCTIONS (Phân hệ User & History)
  # ==========================================
  CreateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: CreateUser
      CodeUri: .
      Handler: src/handlers/users/createUser.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EmailIndexTable

  GetUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetUser
      CodeUri: .
      Handler: src/handlers/users/getUser.handler
      Environment:
        Variables:
          AVATAR_BUCKET_NAME: !Ref AvatarBucket
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UserTable
        - DynamoDBReadPolicy:
            TableName: !Ref EmailIndexTable
      Events:
        GetUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /user
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  CheckUsernameFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: CheckUsername
      CodeUri: .
      Handler: src/handlers/users/checkUsername.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UserTable
      Events:
        CheckUsername:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /users/check-username
            Method: GET


  GetMatchHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetMatchHistory
      CodeUri: .
      Handler: src/handlers/users/getMatchHistory.handler
      Environment:
        Variables:
          MATCH_HISTORY_TABLE: !Ref MatchHistoryTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MatchHistoryTable
        - DynamoDBReadPolicy:
            TableName: !Ref EmailIndexTable
      Events:
        GetMatchHistory:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /matches
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  UpdateUsernameFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: UpdateUsername
      CodeUri: .
      Handler: src/handlers/users/updateUsername.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserTable
        - DynamoDBReadPolicy:
            TableName: !Ref EmailIndexTable
      Events:
        UpdateUsername:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /user/username
            Method: PUT
            Auth:
              Authorizer: CognitoAuthorizer

  GetAvatarUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetAvatarUploadUrl
      CodeUri: .
      Handler: src/handlers/users/getAvatarUploadUrl.handler
      Environment:
        Variables:
          AVATAR_BUCKET_NAME: !Ref AvatarBucket
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EmailIndexTable
        - S3WritePolicy:
            BucketName: !Ref AvatarBucket
      Events:
        GetAvatarUploadUrl:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /users/avatar-upload-url
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  GetLeaderboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetLeaderboard
      CodeUri: .
      Handler: src/handlers/users/getLeaderboard.handler
      Environment:
        Variables:
          AVATAR_BUCKET_NAME: !Ref AvatarBucket
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UserTable
      Events:
        GetLeaderboard:
          Type: HttpApi
          Properties:
            ApiId: !Ref BattleshipHttpApi
            Path: /users/top-commanders
            Method: GET

Outputs:
  HttpApiUrl:
    Description: HTTP API base URL.
    Value: !Sub "https://${BattleshipHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  WebSocketUrl:
    Description: WebSocket API URL.
    Value: !Sub "wss://${BattleshipWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  RoomsTableName:
    Description: DynamoDB rooms table name.
    Value: !Ref RoomsTable
  ChatMessagesTableName:
    Description: DynamoDB room chat messages table name.
    Value: !Ref ChatMessagesTable
