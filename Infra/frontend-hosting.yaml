AWSTemplateFormatVersion: "2010-09-09"
Description: Cloud Battleship Arena frontend hosting on S3, CloudFront, and GitHub Actions OIDC.

Parameters:
  ProjectName:
    Type: String
    Default: cloud-battleship-arena
    Description: Prefix used for named frontend resources.

  EnvironmentName:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z0-9-]+$"
    Description: Environment suffix for named resources.

  FrontendBucketName:
    Type: String
    Default: ""
    Description: Optional globally unique bucket name. Leave empty to let CloudFormation generate one.

  GitHubOwner:
    Type: String
    Description: GitHub organization or username that owns the repository.

  GitHubRepo:
    Type: String
    Description: GitHub repository name.

  GitHubOidcProviderArn:
    Type: String
    Default: ""
    Description: Optional existing GitHub OIDC provider ARN. Leave empty to create one in this stack.

  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All
    Description: CloudFront edge location price class.

Conditions:
  HasFrontendBucketName: !Not [!Equals [!Ref FrontendBucketName, ""]]
  CreateGitHubOidcProvider: !Equals [!Ref GitHubOidcProviderArn, ""]

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If [HasFrontendBucketName, !Ref FrontendBucketName, !Ref AWS::NoValue]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-${EnvironmentName}-frontend-oac"
        Description: Access control for the frontend S3 origin.
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${ProjectName} ${EnvironmentName} frontend"
        Enabled: true
        HttpVersion: http2and3
        DefaultRootObject: index.html
        PriceClass: !Ref PriceClass
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateGitHubOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${EnvironmentName}-frontend-github-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateGitHubOidcProvider
                - !Ref GitHubOidcProvider
                - !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub "repo:${GitHubOwner}/${GitHubRepo}:ref:refs/heads/main"
                  - !Sub "repo:${GitHubOwner}/${GitHubRepo}:ref:refs/heads/develop"
      Policies:
        - PolicyName: FrontendDeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt FrontendBucket.Arn
              - Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "${FrontendBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

Outputs:
  FrontendBucketName:
    Description: S3 bucket for frontend build artifacts.
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID for GitHub Actions invalidation.
    Value: !Ref FrontendDistribution

  CloudFrontDomainName:
    Description: CloudFront domain name for the frontend website.
    Value: !GetAtt FrontendDistribution.DomainName

  FrontendAppUrl:
    Description: HTTPS URL for the frontend website.
    Value: !Sub "https://${FrontendDistribution.DomainName}"

  GitHubDeployRoleArn:
    Description: IAM role ARN to store as the AWS_DEPLOY_ROLE_ARN GitHub Actions secret.
    Value: !GetAtt GitHubDeployRole.Arn
