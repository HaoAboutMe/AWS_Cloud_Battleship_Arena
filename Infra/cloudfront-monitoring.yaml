AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFront monitoring for Cloud Battleship Arena. Deploy this stack in us-east-1.

Parameters:
  ProjectName:
    Type: String
    Default: cloud-battleship-arena
    Description: Prefix used for named monitoring resources.

  EnvironmentName:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z0-9-]+$"
    Description: Environment suffix for named resources.

  CloudFrontDistributionId:
    Type: String
    Description: CloudFront distribution ID to monitor.

  MonitoringAlarmEmail:
    Type: String
    Description: Email address that receives CloudWatch alarm notifications.

  CloudFront5xxErrorRateThreshold:
    Type: Number
    Default: 5
    MinValue: 1
    Description: CloudFront 5xx error rate percentage required to trigger an alarm.

  CloudFrontTotalErrorRateThreshold:
    Type: Number
    Default: 15
    MinValue: 1
    Description: CloudFront total error rate percentage required to trigger an alarm.

Resources:
  MonitoringAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-${EnvironmentName}-cloudfront-monitoring-alarms"
      DisplayName: !Sub "${ProjectName} ${EnvironmentName} CloudFront monitoring alarms"

  MonitoringAlarmSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref MonitoringAlarmTopic
      Endpoint: !Ref MonitoringAlarmEmail

  CloudFront5xxErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${EnvironmentName}-cloudfront-5xx-error-rate"
      AlarmDescription: Alerts when CloudFront 5xx error rate is elevated.
      Namespace: AWS/CloudFront
      MetricName: 5xxErrorRate
      Dimensions:
        - Name: DistributionId
          Value: !Ref CloudFrontDistributionId
        - Name: Region
          Value: Global
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: !Ref CloudFront5xxErrorRateThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Unit: Percent
      AlarmActions:
        - !Ref MonitoringAlarmTopic
      OKActions:
        - !Ref MonitoringAlarmTopic

  CloudFrontTotalErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectName}-${EnvironmentName}-cloudfront-total-error-rate"
      AlarmDescription: Alerts when CloudFront total error rate is elevated.
      Namespace: AWS/CloudFront
      MetricName: TotalErrorRate
      Dimensions:
        - Name: DistributionId
          Value: !Ref CloudFrontDistributionId
        - Name: Region
          Value: Global
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: !Ref CloudFrontTotalErrorRateThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Unit: Percent
      AlarmActions:
        - !Ref MonitoringAlarmTopic
      OKActions:
        - !Ref MonitoringAlarmTopic

  CloudFrontCloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${ProjectName}-${EnvironmentName}-cloudfront"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "CloudFront requests and errors",
                "region": "us-east-1",
                "stat": "Sum",
                "period": 300,
                "metrics": [
                  [ "AWS/CloudFront", "Requests", "DistributionId", "${CloudFrontDistributionId}", "Region", "Global" ],
                  [ ".", "TotalErrorRate", ".", "${CloudFrontDistributionId}", ".", "Global", { "stat": "Average", "yAxis": "right" } ],
                  [ ".", "5xxErrorRate", ".", "${CloudFrontDistributionId}", ".", "Global", { "stat": "Average", "yAxis": "right" } ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "CloudFront traffic",
                "region": "us-east-1",
                "stat": "Sum",
                "period": 300,
                "metrics": [
                  [ "AWS/CloudFront", "BytesDownloaded", "DistributionId", "${CloudFrontDistributionId}", "Region", "Global" ],
                  [ ".", "BytesUploaded", ".", "${CloudFrontDistributionId}", ".", "Global" ]
                ]
              }
            }
          ]
        }

Outputs:
  CloudFrontCloudWatchDashboardName:
    Description: CloudWatch dashboard name for CloudFront metrics.
    Value: !Sub "${ProjectName}-${EnvironmentName}-cloudfront"

  CloudFrontMonitoringAlarmTopicArn:
    Description: SNS topic ARN used for CloudFront CloudWatch alarm notifications.
    Value: !Ref MonitoringAlarmTopic
